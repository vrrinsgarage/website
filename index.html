<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vrrins Garage - Bengkel Mobil Rumah & Panggilan</title>
  
  <!-- Path relatif ke CSS (tanpa tanda / diawal) -->
  <link rel="stylesheet" href="style.css">
  
  <!-- Font Awesome untuk Icon (Opsional tapi direkomendasikan agar icon selalu muncul) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <!-- HEADER / NAVBAR -->
  <header class="header">
    <div class="logo-container">
      <!-- Sesuaikan nama file logo jika ada -->
      <img src="images/logo.png" alt="Vrrins Garage Logo" class="logo-img" onerror="this.style.display='none'">
      <span class="logo-text">VRRINS GARAGE</span>
    </div>

    <nav class="nav-menu">
      <a href="#beranda"><i class="fa-solid fa-house"></i> Beranda</a>
      <a href="#layanan-unggulan"><i class="fa-solid fa-star"></i> Layanan Unggulan</a>
      <a href="#sistem"><i class="fa-solid fa-gears"></i> Layanan Berdasarkan Sistem</a>
      <a href="#faq"><i class="fa-solid fa-circle-question"></i> FAQ</a>
      <a href="#hubungi"><i class="fa-solid fa-phone"></i> Hubungi Kami</a>
      <a href="#tentang"><i class="fa-solid fa-circle-info"></i> Tentang Kami</a>
    </nav>

    <div class="header-actions">
      <a href="https://wa.me/628123456789" target="_blank" class="btn-wa">
        <i class="fa-brands fa-whatsapp"></i> BOOKING WA
      </a>
    </div>
  </header>

  <!-- GARIS PEMBATAS MERAH -->
  <div class="divider"></div>

  <!-- KONTEN UTAMA -->
  <main class="container">
    <section id="sistem" class="section">
      <h2>Layanan Berdasarkan Sistem</h2>
      
      <div class="services-grid">
        
        <!-- Item 1 -->
        <div class="service-item">
          <!-- Pastikan nama file gambar di folder images/ persis sama -->
          <img src="images/sistem-mesin.png" alt="Icon Mesin" class="service-icon" onerror="this.src='https://via.placeholder.com/40?text=🔧'">
          <div class="service-title">
            <i class="fa-solid fa-wrench"></i> Sistem Mesin
          </div>
        </div>

        <!-- Item 2 -->
        <div class="service-item">
          <img src="images/sistem-pelumasan.png" alt="Icon Pelumasan" class="service-icon" onerror="this.src='https://via.placeholder.com/40?text=🛢️'">
          <div class="service-title">
            <i class="fa-solid fa-oil-can"></i> Sistem Pelumasan
          </div>
        </div>

        <!-- Item 3 -->
        <div class="service-item">
          <img src="images/sistem-pendingin.png" alt="Icon Pendingin" class="service-icon" onerror="this.src='https://via.placeholder.com/40?text=❄️'">
          <div class="service-title">
            <i class="fa-solid fa-snowflake"></i> Sistem Pendingin
          </div>
        </div>

        <!-- Item 4 -->
        <div class="service-item">
          <img src="images/sistem-kelistrikan.png" alt="Icon Kelistrikan" class="service-icon" onerror="this.src='https://via.placeholder.com/40?text=⚡'">
          <div class="service-title">
            <i class="fa-solid fa-bolt"></i> Sistem Kelistrikan
          </div>
        </div>

        <!-- Item 5 -->
        <div class="service-item">
          <img src="images/sistem-bahan-bakar.png" alt="Icon Bahan Bakar" class="service-icon" onerror="this.src='https://via.placeholder.com/40?text=⛽'">
          <div class="service-title">
            <i class="fa-solid fa-gas-pump"></i> Sistem Bahan Bakar
          </div>
        </div>

        <!-- Item 6 -->
        <div class="service-item">
          <img src="images/sistem-rem.png" alt="Icon Rem" class="service-icon" onerror="this.src='https://via.placeholder.com/40?text=🛑'">
          <div class="service-title">
            <i class="fa-solid fa-circle-dot"></i> Sistem Rem
          </div>
        </div>

        <!-- Item 7 -->
        <div class="service-item">
          <img src="images/sistem-transmisi.png" alt="Icon Transmisi" class="service-icon" onerror="this.src='https://via.placeholder.com/40?text=⚙️'">
          <div class="service-title">
            <i class="fa-solid fa-gear"></i> Sistem Transmisi
          </div>
        </div>

      </div>
    </section>
  </main>

</body>
</html>
