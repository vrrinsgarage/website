<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VRRINS GARAGE - Bengkel Mobil Rumahan & Panggilan Palembang</title>
    
    <!-- Font Awesome untuk Ikon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ========================================================
           1. RESET & BASE STYLES (SAMA DI SEMUA PERANGKAT)
           ======================================================== */
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #000; 
            color: #fff; 
            line-height: 1.6; 
            overflow-x: hidden;
        }
        .container { 
            width: 90%; 
            max-width: 1200px; 
            margin: 0 auto; 
        }
        img {
            max-width: 100%;
            height: auto;
        }
        a {
            text-decoration: none;
        }

        /* ========================================================
           2. NAVBAR STYLES (MOBILE FIRST)
           ======================================================== */
        .navbar { 
            padding: 15px 0; 
            border-bottom: 1px solid #111; 
            background-color: #000;
            position: sticky;
            top: 0;
            z-index: 999;
        }
        .nav-container { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        .logo img { 
            height: 40px; 
            display: block;
        }
        .nav-links { 
            display: none; /* Sembunyikan menu teks di HP biar tidak berantakan */
        } 
        .btn-wa-nav { 
            background: #25d366; 
            color: #fff; 
            padding: 8px 14px; 
            border-radius: 5px; 
            font-size: 12px; 
            font-weight: bold; 
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* ========================================================
           3. HERO SECTION (MOBILE FIRST)
           ======================================================== */
        .hero-section { 
            padding: 40px 0; 
            text-align: center; 
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.95)), url('hero-bg.jpg') no-repeat center center/cover;
        }
        .hero-section h1 { 
            font-size: 22px; 
            color: #fff; 
            letter-spacing: 1px;
        }
        .highlight { 
            font-size: 28px; 
            font-weight: 900; 
            color: #ff0000;
            margin: 10px 0; 
            line-height: 1.2; 
        }
        .hero-section p {
            font-size: 14px;
            color: #ccc;
            margin-bottom: 25px;
        }
        .hero-buttons { 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
        }
        .btn-wa-hero { 
            background: #25d366; 
            color: #fff; 
            padding: 14px; 
            border-radius: 6px; 
            font-weight: bold; 
            font-size: 15px;
        }
        .btn-outline { 
            border: 1px solid #fff; 
            padding: 14px; 
            border-radius: 6px; 
            color: #fff; 
            font-weight: bold;
            font-size: 15px;
        }
        .hero-badge {
            margin-top: 30px;
            background: #111;
            padding: 10px;
            border-radius: 6px;
            display: inline-block;
            border: 1px solid #222;
        }
        .hero-badge small { color: #888; }
        .hero-badge strong { color: #ff0000; }

        /* ========================================================
           4. FEATURES BAR (MOBILE FIRST)
           ======================================================== */
        .features-bar {
            background: #0a0a0a;
            padding: 30px 0;
            border-top: 1px solid #151515;
            border-bottom: 1px solid #151515;
        }
        .features-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }
        .feature-item {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #111;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #222;
        }
        .feature-item i {
            font-size: 24px;
            color: #ff0000;
        }
        .feature-item h4 {
            font-size: 14px;
            color: #fff;
            margin-bottom: 2px;
        }
        .feature-item p {
            font-size: 12px;
            color: #888;
        }

        /* ========================================================
           5. SERVICES SECTION (MOBILE FIRST)
           ======================================================== */
        .services-section {
            padding: 50px 0;
        }
        .section-title {
            text-align: center;
            margin-bottom: 30px;
        }
        .section-title h2 {
            font-size: 24px;
            letter-spacing: 1px;
        }
        .section-title h2 span {
            color: #ff0000;
        }
        .services-grid { 
            display: grid; 
            grid-template-columns: 1fr; /* 1 Kolom penuh di HP biar gak sempit */
            gap: 25px; 
        }
        .service-card { 
            background: #111; 
            border-radius: 12px; 
            padding: 20px; 
            border: 1px solid #222; 
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .card-header {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            align-items: center;
        }
        .card-header i {
            font-size: 24px;
            color: #ff0000;
        }
        .card-header h3 {
            font-size: 18px;
        }
        .card-header p {
            font-size: 12px;
            color: #777;
        }
        .card-img img { 
            width: 100%; 
            border-radius: 8px; 
            height: 180px; 
            object-fit: cover; 
            margin-bottom: 15px;
        }
        .card-features {
            list-style: none;
            margin-bottom: 15px;
        }
        .card-features li {
            font-size: 13px;
            color: #ccc;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card-features li i {
            color: #ff0000;
            font-size: 11px;
        }
        .card-meta { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 15px;
            padding: 10px 0;
            border-top: 1px solid #222;
            border-bottom: 1px solid #222;
        }
        .price { 
            color: #fff; 
            font-size: 16px; 
            font-weight: bold; 
        }
        .duration {
            font-size: 11px;
            color: #888;
            text-align: right;
            line-height: 1.2;
        }
        .card-buttons { 
            display: flex; 
            gap: 10px; 
        }
        .btn-detail, .btn-wa-card { 
            flex: 1; 
            padding: 12px; 
            border-radius: 6px; 
            text-align: center; 
            font-weight: bold; 
            font-size: 14px;
            border: none; 
        }
        .btn-detail { 
            background: #222; 
            color: #fff; 
            cursor: pointer;
            border: 1px solid #333;
        }
        .btn-wa-card { 
            background: #25d366; 
            color: #fff; 
        }
        .service-note {
            text-align: center;
            font-size: 12px;
            color: #555;
            margin-top: 20px;
        }

        /* ========================================================
           6. WORKFLOW SLIDER STYLES
           ======================================================== */
        .workflow-slider-container {
            max-width: 900px;
            margin: 30px auto 0;
            background: #111;
            border: 1px solid #222;
            border-radius: 12px;
            overflow: hidden;
        }
        .workflow-tabs {
            display: flex;
            background: #161616;
            border-bottom: 1px solid #222;
        }
        .workflow-tab-btn {
            flex: 1;
            padding: 12px 5px;
            background: none;
            border: none;
            color: #666;
            font-weight: bold;
            font-size: 12px;
            cursor: pointer;
            text-align: center;
            border-bottom: 3px solid transparent;
        }
        .workflow-tab-btn.vrrins-active {
            color: #ff0000 !important;
            background: #1a1a1a !important;
            border-bottom-color: #ff0000 !important;
        }
        .workflow-tab-btn span {
            display: none; /* Sembunyikan teks detail tombol di HP biar gak dempet */
        }
        .workflow-content-wrapper {
            position: relative;
            width: 100%;
            height: 260px;
            background: #000;
        }
        .workflow-slide {
            display: none;
            width: 100%;
            height: 100%;
        }
        .workflow-slide.vrrins-show {
            display: block !important;
        }
        .workflow-slide img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* ========================================================
           7. INFO SECTION (AREA & GALERI)
           ======================================================== */
        .info-section {
            padding: 50px 0;
            background: #050505;
        }
        .info-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 40px;
        }
        .area-box h3, .gallery-box h3 {
            font-size: 18px;
            margin-bottom: 20px;
            letter-spacing: 1px;
            border-left: 3px solid #ff0000;
            padding-left: 10px;
        }
        .area-list {
            list-style: none;
            margin-top: 20px;
        }
        .area-list li {
            font-size: 13px;
            margin-bottom: 12px;
            color: #ccc;
        }
        .dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 10px;
        }
        .dot.green { background: #25d366; }
        .dot.yellow { background: #ffc107; }
        .dot.red { background: #dc3545; }
        
        .gallery-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .gallery-header h3 { margin-bottom: 0; }
        .btn-gallery-all {
            font-size: 11px;
            color: #ff0000;
            font-weight: bold;
        }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }
        .gallery-item {
            position: relative;
            border-radius: 6px;
            overflow: hidden;
            height: 110px;
        }
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .gallery-item span {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.7);
            font-size: 11px;
            padding: 4px;
            text-align: center;
        }

        /* ========================================================
           8. CTA BANNER (MOBILE FIRST)
           ======================================================== */
        .cta-banner {
            background: #ff0000;
            padding: 35px 0;
            text-align: center;
        }
        .cta-text {
            margin-bottom: 20px;
        }
        .cta-text i {
            font-size: 32px;
            margin-bottom: 10px;
        }
        .cta-text h2 {
            font-size: 20px;
            font-weight: 900;
        }
        .cta-text p {
            font-size: 13px;
            opacity: 0.9;
        }
        .btn-wa-large {
            display: block;
            background: #fff;
            color: #000;
            padding: 14px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 15px;
        }

        /* ========================================================
           9. FOOTER (PAS 3 KOLOM SEIMBANG DI MOBILE - TANPA OPERASIONAL)
           ======================================================== */
        footer { 
            background: #000;
            padding: 40px 0 20px;
            border-top: 1px solid #111;
        }
        .footer-grid { 
            display: grid; 
            grid-template-columns: 1fr; /* Menurun lurus ke bawah di HP */
            gap: 30px; 
            text-align: center; 
        }
        .footer-logo { 
            width: 140px; 
            margin: 0 auto 15px;
            display: block;
        }
        footer p {
            font-size: 13px;
            color: #888;
        }
        footer h4 {
            font-size: 15px;
            color: #fff;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }
        footer ul {
            list-style: none;
        }
        footer ul li {
            margin-bottom: 8px;
        }
        footer ul li a {
            color: #888;
            font-size: 13px;
        }
        footer ul li a:hover {
            color: #ff0000;
        }
        .footer-bottom {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #111;
        }
        .bottom-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            text-align: center;
        }

        /* ========================================================
           10. POP-UP MODAL STYLE
           ======================================================== */
        .vrrins-modal {
            display: none; 
            position: fixed; 
            z-index: 99999; 
            padding-top: 50px; 
            left: 0; top: 0; width: 100%; height: 100%; 
            overflow: auto; 
            background-color: rgba(0,0,0,0.9); 
            backdrop-filter: blur(4px);
        }
        .vrrins-modal-content {
            background-color: #111;
            margin: 20px auto;
            padding: 20px;
            border: 1px solid #222;
            border-top: 4px solid #ff0000;
            width: 90%;
            max-width: 500px;
            border-radius: 8px;
            position: relative;
        }
        .vrrins-modal-close {
            color: #fff;
            position: absolute;
            right: 15px; top: 10px;
            font-size: 28px;
            cursor: pointer;
        }
        .vrrins-modal h3 {
            font-size: 18px;
            margin-bottom: 5px;
        }
        .vrrins-modal h3 span { color: #ff0000; }
        .vrrins-modal p.subtitle {
            font-size: 12px;
            color: #666;
            margin-bottom: 15px;
            border-bottom: 1px solid #222;
            padding-bottom: 8px;
        }
        .vrrins-modal-body h4 {
            color: #ff0000;
            font-size: 13px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        .vrrins-modal-body ul {
            list-style: none;
        }
        .vrrins-modal-body ul li {
            font-size: 13px;
            color: #ccc;
            padding: 6px 0;
            border-bottom: 1px solid #161616;
        }
        .vrrins-modal-footer {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .vrrins-btn-close-modal {
            flex: 1; background: #222; color: #fff; border: 1px solid #333; padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer;
        }
        .vrrins-btn-wa-modal {
            flex: 1.5; background: #25d366; color: #fff; padding: 10px; border-radius: 6px; font-weight: bold; text-align: center;
        }

        /* ========================================================
           11. MEDIA QUERIES (UNTUK TAMPILAN LAPTOP / DESKTOP)
           ======================================================== */
        @media (min-width: 768px) {
            .nav-links { 
                display: flex; 
                gap: 20px; 
                list-style: none; 
            }
            .nav-links a { 
                color: #fff; 
                font-size: 13px; 
                font-weight: bold;
            }
            .nav-links a.active, .nav-links a:hover {
                color: #ff0000;
            }
            .btn-wa-nav {
                font-size: 13px;
                padding: 10px 18px;
            }
            .hero-section { padding: 80px 0; }
            .hero-section h1 { font-size: 32px; }
            .highlight { font-size: 48px; }
            .hero-section p { font-size: 16px; max-width: 700px; margin: 0 auto 30px; }
            .hero-buttons { flex-direction: row; justify-content: center; gap: 15px; }
            .btn-wa-hero, .btn-outline { padding: 15px 30px; font-size: 16px; }
            
            .features-grid { grid-template-columns: repeat(3, 1fr); }
            .services-grid { grid-template-columns: repeat(2, 1fr); }
            
            .workflow-tab-btn span { display: block; font-size: 10px; color: #555; margin-top: 2px; }
            .workflow-content-wrapper { height: 450px; }
            
            .info-grid { grid-template-columns: 1fr 1fr; }
            .gallery-grid { grid-template-columns: repeat(3, 1fr); }
            .gallery-item { height: 120px; }
            
            .cta-banner { text-align: left; padding: 50px 0; }
            .cta-container { display: flex; justify-content: space-between; align-items: center; }
            .cta-text { margin-bottom: 0; display: flex; align-items: center; gap: 20px; }
            .cta-text i { margin-bottom: 0; font-size: 40px; }
            .cta-text h2 { font-size: 24px; }
            .btn-wa-large { display: inline-block; padding: 15px 30px; }
            
            .footer-grid { grid-template-columns: repeat(3, 1fr); text-align: left; }
            .footer-logo { margin: 0 0 15px 0; }
            .bottom-container { flex-direction: row; justify-content: space-between; }
        }

        @media (min-width: 1024px) {
            .services-grid { grid-template-columns: repeat(4, 1fr); }
            .features-grid { grid-template-columns: repeat(6, 1fr); }
            .workflow-content-wrapper { height: 550px; }
        }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="container nav-container">
            <a href="#" class="logo">
                <img src="logo.png" alt="VRRINS GARAGE Logo">
            </a>
            <ul class="nav-links">
                <li><a href="#" class="active">BERANDA</a></li>
                <li><a href="#layanan">LAYANAN</a></li>
                <li><a href="#area">AREA</a></li>
                <li><a href="#galeri">GALERI</a></li>
                <li><a href="#kontak">KONTAK</a></li>
            </ul>
            <a href="https://wa.me/62895622499262" target="_blank" class="btn-wa-nav">
                <i class="fab fa-whatsapp"></i> BOOKING WA
            </a>
        </div>
    </nav>
