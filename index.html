<!DOCTYPE html>
<html lang="id">
<head>
  <!-- TAG VIEWPORT SANGAT PENTING AGAR PAS DI HP -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>VRRINS GARAGE - Bengkel Mobil</title>
  
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    /* RESET BASE */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background-color: #0d0d0d;
      color: #ffffff;
      line-height: 1.5;
      overflow-x: hidden; /* Mencegah layar geser kanan-kiri yang rusak */
    }

    img {
      max-width: 100%;
      height: auto;
      display: block;
    }

    /* HEADER & NAVBAR RESPONSIVE */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      background-color: #000000;
      border-bottom: 2px solid #e60000;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-text {
      font-weight: 800;
      font-size: 1.1rem;
      color: #ffffff;
      letter-spacing: 0.5px;
    }

    /* Menu Navigasi di HP */
    .nav-menu {
      display: flex;
      gap: 15px;
      align-items: center;
      flex-wrap: wrap;
    }

    .nav-menu a {
      color: #ffffff !important;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .nav-menu a i {
      color: #e60000;
    }

    .btn-wa {
      background-color: #25d366;
      color: #ffffff !important;
      padding: 8px 14px;
      border-radius: 6px;
      text-decoration: none;
      font-weight: bold;
      font-size: 0.85rem;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    /* KONTEN UTAMA */
    .container {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 30px 15px;
    }

    .section-title {
      font-size: 1.4rem;
      font-weight: 800;
      margin-bottom: 25px;
      text-align: center;
      text-transform: uppercase;
    }

    .section-title span {
      color: #e60000;
    }

    /* GRID CARDS (MENYESUAIKAN HP & PC) */
    .services-grid {
      display: grid;
      /* Di HP otomatis 1-2 kolom, di Laptop otomatis 4 kolom */
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
    }

    .service-card {
      background-color: #141414;
      border: 1px solid #262626;
      border-radius: 8px;
      padding: 20px 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 10px;
      transition: border-color 0.2s;
    }

    .service-card:active, .service-card:hover {
      border-color: #e60000;
    }

    .service-card i {
      font-size: 1.8rem;
      color: #e60000;
    }

    .service-card h3 {
      font-size: 0.85rem;
      font-weight: 700;
      color: #ffffff;
    }

    /* MEDIA QUERIES KHUSUS HP (Screen <= 600px) */
    @media (max-width: 600px) {
      .header {
        flex-direction: column;
        align-items: stretch;
        gap: 12px;
      }

      .logo-container {
        justify-content: center;
      }

      .nav-menu {
        justify-content: center;
        gap: 10px;
      }

      .btn-wa {
        justify-content: center;
        width: 100%;
      }

      .section-title {
        font-size: 1.2rem;
      }

      .services-grid {
        grid-template-columns: repeat(2, 1fr); /* Pas 2 kolom rapi di HP */
      }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="logo-container">
      <span class="logo-text">VRRINS GARAGE</span>
    </div>

    <nav class="nav-menu">
      <a href="#beranda"><i class="fa-solid fa-house"></i> Beranda</a>
      <a href="#layanan"><i class="fa-solid fa-star"></i> Layanan</a>
      <a href="#faq"><i class="fa-solid fa-circle-question"></i> FAQ</a>
      <a href="#hubungi"><i class="fa-solid fa-phone"></i> Hubungi</a>
    </nav>

    <a href="https://wa.me/628123456789" target="_blank" class="btn-wa">
      <i class="fa-brands fa-whatsapp"></i> BOOKING WA
    </a>
  </header>

  <!-- KONTEN UTAMA -->
  <main class="container">
    <h2 class="section-title">LAYANAN <span>SISTEM KENDARAAN</span></h2>

    <div class="services-grid">
      <div class="service-card">
        <i class="fa-solid fa-gears"></i>
        <h3>Sistem Mesin</h3>
      </div>

      <div class="service-card">
        <i class="fa-solid fa-oil-can"></i>
        <h3>Sistem Pelumasan</h3>
      </div>

      <div class="service-card">
        <i class="fa-solid fa-gas-pump"></i>
        <h3>Sistem Bahan Bakar</h3>
      </div>

      <div class="service-card">
        <i class="fa-solid fa-car-side"></i>
        <h3>Sistem Suspensi</h3>
      </div>

      <div class="service-card">
        <i class="fa-solid fa-circle-dot"></i>
        <h3>Sistem Rem</h3>
      </div>

      <div class="service-card">
        <i class="fa-solid fa-fan"></i>
        <h3>Sistem Pendingin</h3>
      </div>

      <div class="service-card">
        <i class="fa-solid fa-gauge-high"></i>
        <h3>Sistem Transmisi</h3>
      </div>

      <div class="service-card">
        <i class="fa-solid fa-bolt"></i>
        <h3>Sistem Kelistrikan</h3>
      </div>

      <div class="service-card">
        <i class="fa-solid fa-dharmachakra"></i>
        <h3>Sistem Kemudi</h3>
      </div>
    </div>
  </main>

</body>
</html>
